site_name: 计算机基础技能文档站
site_description: 面向新手到进阶的 Shell、Git、SSH、Docker、Linux、网络、CI/CD 与 GitHub 完整教程
site_url: https://<YOUR_GITHUB_USERNAME>.github.io/computer-basic-skills/
repo_url: https://github.com/<YOUR_GITHUB_USERNAME>/computer-basic-skills
repo_name: computer-basic-skills

theme:
  name: material
  language: zh
  features:
    - navigation.sections
    - navigation.expand
    - navigation.path
    - toc.integrate
    - search.suggest
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details

nav:
  - 首页: index.md
  - Shell 与各类 Shell: shell.md
  - Git 完整教程: git.md
  - SSH 完整教程: ssh.md
  - Docker 完整教程: docker.md
  - Linux 基础与运维: linux.md
  - 网络诊断与排障: network.md
  - CI/CD 自动化发布: cicd.md
  - GitHub 使用指南: github-guide.md

strict: true
